name = "sena-platform"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
PLATFORM_BASE_URL = "https://sena-platform.your-domain.workers.dev"
SLACK_WORKSPACE_ID = "default"

# Secrets (set via `wrangler secret put`):
# VAULT_MASTER_KEY

[[d1_databases]]
binding = "DB"
database_name = "sena-platform"
database_id = "your-d1-database-id"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "sena-uploads"

[durable_objects]
bindings = [
  { name = "RELAY_DO", class_name = "RelayDurableObject" }
]

[[migrations]]
tag = "v1"
new_classes = ["RelayDurableObject"]

[triggers]
crons = ["0 */10 * * *"]
