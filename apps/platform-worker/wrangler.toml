name = "sena-platform"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
PLATFORM_BASE_URL = "https://sena-platform.yechanny.workers.dev"
SLACK_WORKSPACE_ID = "default"

# Secrets (set via `wrangler secret put`):
# VAULT_MASTER_KEY
# SLACK_CONFIG_TOKEN
# SLACK_CONFIG_REFRESH_TOKEN

[[d1_databases]]
binding = "DB"
database_name = "sena-platform"
database_id = "5d8942dd-9ba3-434a-a451-519c9dd721ac"

[durable_objects]
bindings = [
  { name = "RELAY_DO", class_name = "RelayDurableObject" }
]

[[migrations]]
tag = "v1"
new_classes = ["RelayDurableObject"]

[triggers]
crons = ["0 */10 * * *"]
