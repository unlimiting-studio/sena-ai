name = "sena-agent-container"
main = "src/index.js"
compatibility_date = "2025-02-01"

[observability]
enabled = true

[[containers]]
class_name = "SenaAgentContainer"
image = "../../agent/Dockerfile"
max_instances = 10
instance_type = "standard-1"
rollout_step_percentage = 100

[[durable_objects.bindings]]
name = "SENA_AGENT"
class_name = "SenaAgentContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SenaAgentContainer"]

[[d1_databases]]
binding = "SENA_APPS"
database_name = "sena-apps"
database_id = "8f911788-17cc-430c-90d5-8588c016f566"
migrations_dir = "migrations"

[vars]
NODE_ENV = "production"
BACKEND_URL = "https://<your-worker-domain>"
WORKSPACE_DIR = "/tmp/sena-workspaces"
SLACK_VERIFY_MODE = "external"
SLACK_APP_ID = "A09PZRBLM3L"
SLACK_CLIENT_ID = "8262598999586.9815861701122"
